<!DOCTYPE html><html lang="pt"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Dashboard de Gestão</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#13293d;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;color:#1f2a37;border-radius:18px;padding:36px 32px;max-width:380px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.lock{width:60px;height:60px;border-radius:50%;background:#2b638b;color:#fff;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 16px}
h1{font-size:19px;font-weight:600;margin-bottom:4px}
p.sub{font-size:13px;color:#6b7280;margin-bottom:22px}
input{width:100%;padding:12px 14px;border:1px solid #d8dce2;border-radius:10px;font-size:15px;margin-bottom:12px;font-family:inherit}
input:focus{outline:none;border-color:#2b638b}
button{width:100%;padding:12px;background:#2b638b;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
button:hover{background:#1f4d6e}
button:disabled{opacity:.6;cursor:default}
.err{color:#dc2626;font-size:13px;margin-top:12px;min-height:18px}
.foot{font-size:11px;color:#9aa3af;margin-top:18px}
</style></head><body>
<div class="card">
  <div class="lock">&#128274;</div>
  <h1>Dashboard de Gestão</h1>
  <p class="sub">NeuroGime · Pediátrico · NGA · MindPartner</p>
  <form id="f">

    <label style="display:flex;align-items:center;gap:7px;font-size:13px;color:#6b7280;margin:-2px 0 12px;cursor:pointer;text-align:left"><input type="checkbox" id="rm" checked style="width:auto;margin:0"> Lembrar neste computador</label>
    <button type="submit" id="b">Entrar</button>
  </form>
  <div class="err" id="e"></div>

</div>

function b64(s){const bin=atob(s),a=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i);return a;}
async function open_(pw){
  const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b64(ENC.salt),iterations:ENC.iter,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64(ENC.nonce)},key,b64(ENC.ct));
  const html=new TextDecoder().decode(pt);
  const url=URL.createObjectURL(new Blob([html],{type:"text/html"}));
  location.replace(url);
}
var SKEY="dashpw";
document.getElementById("f").addEventListener("submit",async function(ev){
  ev.preventDefault();
  const e=document.getElementById("e"),b=document.getElementById("b");
  e.textContent="";b.disabled=true;b.textContent="A abrir...";
  var pw=document.getElementById("pw").value;
  try{
    if(document.getElementById("rm").checked){ try{localStorage.setItem(SKEY,pw)}catch(x){} }
    else{ try{localStorage.removeItem(SKEY)}catch(x){} }
    await open_(pw);
  }catch(err){ try{localStorage.removeItem(SKEY)}catch(x){} e.textContent="Palavra-passe errada. Tenta de novo."; b.disabled=false;b.textContent="Entrar"; document.getElementById("pw").select(); }
});
// abrir sozinho neste computador se a password ja estiver guardada (anular com ?forget no link)
(function(){
  try{
    if(location.search.indexOf("forget")>=0){ localStorage.removeItem(SKEY); return; }
    var saved=localStorage.getItem(SKEY);
    if(saved){ open_(saved).catch(function(){ try{localStorage.removeItem(SKEY)}catch(x){} }); }
  }catch(x){}
})();
